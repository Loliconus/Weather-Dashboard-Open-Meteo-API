name: 🐛 Сообщение об ошибке
description: Сообщите о баге в Weather Dashboard
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees:
  - Loliconus

body:
  - type: markdown
    attributes:
      value: |
        Спасибо, что сообщаете об ошибке!
        Пожалуйста, заполните форму ниже максимально подробно.

  - type: checkboxes
    id: existing-issues
    attributes:
      label: Предварительная проверка
      options:
        - label: >
            Я проверил, что похожая проблема ещё не была
            [зарегистрирована](../../issues)
          required: true

  - type: dropdown
    id: component
    attributes:
      label: Компонент
      description: В каком компоненте обнаружена ошибка?
      options:
        - Live mode (браузер / fetch API)
        - Snapshot mode (data.js)
        - Поиск города (Geocoding)
        - Графики (Chart.js)
        - Качество воздуха
        - Метеоиндексы
        - CI/CD (GitHub Actions)
        - Python-генератор
        - Другое
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Описание ошибки
      description: Чёткое и краткое описание что пошло не так.
      placeholder: При попытке поиска города "Санкт-Петербург" выпадающий список не появляется...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      description: Пошаговые инструкции для воспроизведения ошибки.
      value: |
        1. Открыть страницу '...'
        2. Нажать на '...'
        3. Ввести '...'
        4. Увидеть ошибку
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
      description: Что должно было произойти?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
      description: Что произошло на самом деле?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Окружение
      description: |
        Пожалуйста, укажите информацию об окружении.
      value: |
        - Браузер и версия:
        - ОС:
        - Python версия (если применимо):
        - Версия проекта (из footer):
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Логи / Console output
      description: >
        Вставьте любые релевантные логи или вывод консоли браузера.
        Будет автоматически отформатировано как код.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Дополнительный контекст
      description: Скриншоты, ссылки, файлы или что-то ещё полезное.