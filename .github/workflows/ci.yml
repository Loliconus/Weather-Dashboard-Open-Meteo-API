# =============================================================
# ПУТЬ        : .github/workflows/ci.yml
# ОБОЗНАЧЕНИЕ : WD.CICD.01
# НАИМЕНОВАНИЕ: CI — качественные шлюзы (MIN профиль)
# ДОКУМЕНТ    : КС-СТО-1.04.СК
# ПРОГРАММА   : Weather Dashboard
# ЗАВИСИМОСТИ : pyproject.toml, tests/
# =============================================================
# Назначение:
#   4 последовательных шлюза: format-check → lint → unit-tests → smoke.
#   Соответствует ТЗ раздел 10.1 и AI-REFERENCE часть 8.
#   Запускается при каждом push и PR в main.
# =============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# -------------------------------------------------------------
# Раздел 1. Переменные окружения
# -------------------------------------------------------------

env:
  PYTHON_VERSION: "3.11"

# -------------------------------------------------------------
# Раздел 2. Jobs
# -------------------------------------------------------------

jobs:

  # -----------------------------------------------------------
  # Шлюз 1: Форматирование
  # -----------------------------------------------------------
  format-check:
    name: "① Format check (ruff format)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Установить ruff
        run: pip install --upgrade "ruff>=0.4"

      - name: Проверить форматирование
        run: ruff format --check .

  # -----------------------------------------------------------
  # Шлюз 2: Линтинг
  # -----------------------------------------------------------
  lint:
    name: "② Lint (ruff check)"
    runs-on: ubuntu-latest
    needs: format-check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Установить ruff
        run: pip install --upgrade "ruff>=0.4"

      - name: Линтинг
        run: ruff check .

  # -----------------------------------------------------------
  # Шлюз 3: Unit-тесты (матрица Python 3.11 / 3.12)
  # -----------------------------------------------------------
  unit-tests:
    name: "③ Unit tests (pytest) — Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Установить пакет + зависимости dev
        run: pip install -e ".[dev]"

      - name: Запустить тесты
        env:
          RST_ENV: dev
          RST_LOG_LEVEL: INFO
          RST_LOG_FORMAT: json
        run: pytest tests/unit/ -v

  # -----------------------------------------------------------
  # Шлюз 4: Smoke
  # -----------------------------------------------------------
  smoke:
    name: "④ Smoke (python -m weather_dashboard)"
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Установить пакет
        run: pip install -e ".[dev]"

      - name: Smoke-запуск
        env:
          RST_ENV: dev
          RST_LOG_LEVEL: INFO
          RST_LOG_FORMAT: json
        run: python -m weather_dashboard